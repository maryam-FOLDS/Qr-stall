<!DOCTYPE html>
<html>
<head>
    <title>Special Memory</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #fff5f8;
            padding: 20px;
        }
        img {
            max-width: 90%;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Your Special Memory ❤️</h1>

<img id="photo" src="" alt="Loading...">

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

if(id){
    document.getElementById("photo").src = "images/" + id + ".jpg";
}else{
    document.body.innerHTML = "<h2>Invalid QR Code</h2>";
}
</script>

</body>
</html>
