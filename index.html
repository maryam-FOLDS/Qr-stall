<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message for You</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#f5e6e8 0%,#faf4f5 25%,#fff 50%,#f0e9eb 75%,#e8dfe2 100%);
font-family:'Montserrat',sans-serif;
padding:20px;
position:relative;
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,rgba(217,175,184,0.15) 0%,transparent 70%);
border-radius:50%;
top:-100px;
right:-100px;
animation:float 20s infinite ease-in-out;
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,rgba(198,159,169,0.1) 0%,transparent 70%);
border-radius:50%;
bottom:-150px;
left:-150px;
animation:float 25s infinite ease-in-out reverse;
}

@keyframes float{
0%,100%{transform:translate(0,0) scale(1);}
33%{transform:translate(30px,-30px) scale(1.05);}
66%{transform:translate(-20px,20px) scale(0.95);}
}

.container{
max-width:800px;
width:100%;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(20px);
border-radius:30px;
padding:60px 40px;
box-shadow:0 20px 60px rgba(198,159,169,0.2);
position:relative;
z-index:1;
}

.greeting{
font-family:'Cormorant Garamond',serif;
font-size:3.5rem;
font-weight:300;
font-style:italic;
color:#8b6f7d;
text-align:center;
margin-bottom:50px;
letter-spacing:2px;
}

.image-container{
width:100%;
max-width:500px;
margin:0 auto 50px;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(139,111,125,0.25);
}

.image-container img{
width:100%;
height:auto;
display:block;
}

.message{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
color:#8b6f7d;
text-align:center;
letter-spacing:3px;
}

.flower{
font-size:2.5rem;
margin-left:10px;
}

</style>
</head>

<body>

<div class="container">

<h1 class="greeting">Hey beautiful,</h1>

<div class="image-container">

<img
id="dynamicImage"
src=""
alt="Special moment"
loading="lazy"
onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\"padding:40px;text-align:center;font-family:Montserrat\">Your memory is being prepared...</div>';"
>

</div>

<div class="message">
I love you<span class="flower">🌸</span>
</div>

</div>


<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
document.getElementById("dynamicImage").src = "images/" + id + ".jpg";
}else{
document.querySelector(".image-container").innerHTML =
"<div style='padding:40px;text-align:center;font-family:Montserrat'>Invalid QR Code</div>";
}

</script>

</body>
</html>
